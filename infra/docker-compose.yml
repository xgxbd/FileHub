services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/node:20-alpine}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/python:3.12-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: filehub-api
    restart: unless-stopped
    environment:
      APP_ENV: docker
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "false"
      APP_SERVE_FRONTEND: "true"
      FRONTEND_DIST_DIR: /app/frontend/dist
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-filehub}:${MYSQL_PASSWORD:-filehub_dev_password}@mysql:3306/${MYSQL_DATABASE:-filehub}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      UPLOAD_SESSION_TTL_SECONDS: 86400
      UPLOAD_TMP_DIR: /app/backend/tmp/uploads
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-filehub}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@filehub.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - backend_tmp_data:/app/backend/tmp
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql:
    image: ${MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.4}
    container_name: filehub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-filehub}
      MYSQL_USER: ${MYSQL_USER:-filehub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-filehub_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_dev_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7.2}
    container_name: filehub-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: ${MINIO_IMAGE:-docker.m.daocloud.io/minio/minio:latest}
    container_name: filehub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  backend_tmp_data:
  mysql_data:
  redis_data:
  minio_data:
